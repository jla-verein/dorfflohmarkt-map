services:
  api:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./overrides.json:/app/overrides.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
